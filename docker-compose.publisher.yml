services:
  telegram-publisher:
    build:
      context: .
      dockerfile: telegram-publisher.Dockerfile
    container_name: telegram-publisher
    restart: unless-stopped
    env_file:
      - .env.publisher
    environment:
      PUBLISH_REPO_DIR: /repo
      BOT_DATA_DIR: /data
      POST_BASE_BRANCH: main
      POLL_TIMEOUT_SECONDS: 50
      AUTO_FINALIZE_MINUTES: 10
      AUTO_FINALIZE_RETRY_MINUTES: 30
      AUTO_MERGE_BOT_PRS: true
      AUTO_MERGE_WAIT_SECONDS: 300
      AUTO_MERGE_POLL_SECONDS: 5
      AUTO_MERGE_METHOD: squash
      GIT_CONFIG_COUNT: 1
      GIT_CONFIG_KEY_0: safe.directory
      GIT_CONFIG_VALUE_0: /repo
    volumes:
      - ./publisher-repo-live:/repo
      - ./publisher-data:/data
